name: Build and Deploy
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Build and Deploy
        uses: testthedocs/github-pages-deploy-action@master
        env:
          ACCESS_TOKEN: ${{ secrets.DEPLOY_KEY }}
          BUILD_DIR: .vuepress/build/ # The folder, the action should deploy.
          BUILD_SCRIPT: npm ci && npm run build # The build script the action should run prior to deploying.
